                widget: string
                required: false
              - label: Hero badges
                name: badges
                widget: list
                field:
                  label: Badge
                  name: badge
                  widget: string
              - label: Portrait photo
                name: portrait
                widget: image
                required: false
              - label: CV (PDF)
                name: cv
                widget: file
                required: false
