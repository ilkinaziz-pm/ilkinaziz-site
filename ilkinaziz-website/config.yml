backend:
  name: git-gateway
  branch: main
media_folder: ''
public_folder: /
site_url: https://ilkinaziz.com
locale: en
collections:
  - name: content
    label: Site content
    files:
      - name: site
        label: Everything
        file: content.json
        description: Edit any part of the site here. Click Save (top-right) to publish.
        fields:
          - label: Settings
            name: settings
            widget: object
            fields:
              - label: Name
                name: name
                widget: string
              - label: Email
                name: email
                widget: string
              - label: Phone
                name: phone
                widget: string
                required: false
              - label: LinkedIn URL
                name: linkedin
                widget: string
                required: false
